sample_rate = 6000
buffer_frames = 256
oscillators = 16
root_key = "A"
root_octave = 1
fine_tune_cents = 50
midi_cents_cc = 1
wavetable_dir = "/var/lib/pirate-synth/wavetables"
wav_dir = "/var/lib/pirate-synth/WAV"
spi_device = "/dev/spidev0.1"
hdmi_visuals_enabled = false

# Audio effects (all feature-flagged, safe to set false if CPU load too high)
reverb_enabled = true
reverb_wet = 0.33
tremolo_enabled = true
tremolo_depth = 0.35
crossfade_enabled = true
crossfade_rate = 0.05
filter_sweep_enabled = true
filter_sweep_min = 0.15
filter_sweep_max = 0.80
filter_sweep_rate_hz = 0.008
fm_enabled = false
fm_depth = 0.15
subtractive_enabled = false
subtractive_depth = 0.30
# Scale mode: 0=N/A 1=MAJOR 2=MINOR 3=PENTA 4=DORIAN 5=MIXO 6=WHOLE 7=HIRAJOSHI 8=LYDIAN
scale_index = 7
# Wavetable bank: 0=A 1=B 2=C 3=D
bank_index = 3
# Transition duration in seconds for cents, scale, and bank changes (±20% jitter applied)
transition_secs = 30.0
# Output volume 0-100 (applied instantly)
volume = 100

# Granular mode (auto-selected when WAV files exist in wav_dir)
granular_grain_size_ms = 250.0
granular_note_ms = 4000.0
granular_density_hz = 4.0
granular_max_overlap = 16
granular_position = 0.1
granular_position_jitter = 0.4
granular_attack_ms = 500.0
granular_release_ms = 500.0
granular_spawn_jitter = 0.5
granular_wavs = 8
