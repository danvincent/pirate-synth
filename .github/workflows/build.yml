name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            libasound2-dev \
            gcc-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            zip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run focused tests
        run: cargo test -p engine -p ui

      - name: Build ARMv6 binary (Pi Zero / Zero W)
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: armv6
          distro: bullseye
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              curl \
              libasound2-dev \
              pkg-config
          run: |
            set -euo pipefail

            export RUSTUP_HOME=/tmp/rustup
            export CARGO_HOME=/tmp/cargo
            export PATH="$CARGO_HOME/bin:$PATH"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            . "$CARGO_HOME/env"

            cd "$GITHUB_WORKSPACE"
            cargo build --release -p pirate_synth
            install -Dm 0755 target/release/pirate_synth dist/pirate_synth-armv6-native

      - name: Package SD bundle
        run: PIRATE_SYNTH_ARMV6_BINARY="$GITHUB_WORKSPACE/dist/pirate_synth-armv6-native" ./scripts/package.sh

      - name: Validate ARMv6 artifact attributes
        run: |
          set -euo pipefail

          rm -rf /tmp/pirate-synth-verify
          mkdir -p /tmp/pirate-synth-verify
          tar -xzf dist/pirate-synth-sdcard.tar.gz -C /tmp/pirate-synth-verify
          tar -xzf dist/pirate-synth-sdcard-armv6.tar.gz -C /tmp/pirate-synth-verify

          ARMHF_BIN="/tmp/pirate-synth-verify/pirate-synth-sdcard/boot/firmware/pirate-synth/bin/pirate_synth"
          ARMV6_BIN="/tmp/pirate-synth-verify/pirate-synth-sdcard-armv6/boot/firmware/pirate-synth/bin/pirate_synth"

          ARMHF_SHA="$(sha256sum "$ARMHF_BIN" | awk '{print $1}')"
          ARMV6_SHA="$(sha256sum "$ARMV6_BIN" | awk '{print $1}')"
          if [[ "$ARMHF_SHA" == "$ARMV6_SHA" ]]; then
            echo "armv6 artifact binary matches armhf binary; expected distinct outputs"
            exit 1
          fi

          ARMV6_ATTRS="$(readelf -A "$ARMV6_BIN")"
          # Always print key attributes to make CI failures diagnosable from logs.
          echo "$ARMV6_ATTRS" | grep -E 'Tag_CPU_name|Tag_CPU_arch|Tag_THUMB_ISA_use|Tag_FP_arch'

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_CPU_arch:[[:space:]]*v7'; then
            echo "armv6 artifact reports ARMv7 CPU architecture"
            exit 1
          fi

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_CPU_name:[[:space:]]*"7-A"'; then
            echo "armv6 artifact reports ARMv7-A CPU name"
            exit 1
          fi

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_THUMB_ISA_use:[[:space:]]*Thumb-2'; then
            echo "armv6 artifact reports Thumb-2 ISA usage"
            exit 1
          fi

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_FP_arch:[[:space:]]*VFPv3'; then
            echo "armv6 artifact reports VFPv3 floating-point ISA"
            exit 1
          fi

          if ! echo "$ARMV6_ATTRS" | grep -Eq 'Tag_CPU_arch:[[:space:]]*v6'; then
            echo "armv6 artifact does not report ARMv6 CPU architecture attributes"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pirate-synth-sdcard
          path: |
            dist/pirate-synth-sdcard.tar.gz
            dist/pirate-synth-sdcard.zip
            dist/pirate-synth-sdcard-armv6.tar.gz
            dist/pirate-synth-sdcard-armv6.zip
