name: build

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -euo pipefail
          source /etc/os-release
          UBUNTU_CODENAME="${VERSION_CODENAME}"

          sudo dpkg --add-architecture armhf
          # On Ubuntu runners the armhf packages are served from ports.ubuntu.com.
          # Restrict the existing deb822 sources to amd64 only, then add a
          # dedicated armhf source from ports.ubuntu.com for the current suite.
          sudo sed -i '/^Types: deb/a Architectures: amd64' \
            /etc/apt/sources.list.d/ubuntu.sources
          printf '%s\n' \
            "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${UBUNTU_CODENAME} main restricted universe" \
            "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${UBUNTU_CODENAME}-updates main restricted universe" \
            "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${UBUNTU_CODENAME}-security main restricted universe" \
            | sudo tee /etc/apt/sources.list.d/armhf-ports.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            qemu-user-static \
            libasound2-dev \
            libasound2-dev:armhf \
            gcc-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            zip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run focused tests
        run: cargo test -p engine -p ui -p pirate_synth

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build ARMv6 binary (Pi Zero / Zero W)
        run: |
          set -euo pipefail

          mkdir -p "$GITHUB_WORKSPACE/dist"
          docker run --rm --platform linux/arm/v6 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            balenalib/rpi-raspbian:bullseye \
            bash -c '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                curl \
                libasound2-dev \
                pkg-config

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "$HOME/.cargo/env"

              export CARGO_TARGET_DIR=/work/target-armv6
              cargo build --release -p pirate_synth
              install -Dm 0755 "$CARGO_TARGET_DIR/release/pirate_synth" /work/dist/pirate_synth-armv6-native
            '

      - name: Fix workspace permissions after ARMv6 container build
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/dist"

      - name: Package SD bundle
        run: PIRATE_SYNTH_ARMV6_BINARY="$GITHUB_WORKSPACE/dist/pirate_synth-armv6-native" ./scripts/package.sh

      - name: Validate ARMv6 artifact attributes
        run: |
          set -euo pipefail

          rm -rf /tmp/pirate-synth-verify
          mkdir -p /tmp/pirate-synth-verify
          tar -xzf dist/pirate-synth-sdcard.tar.gz -C /tmp/pirate-synth-verify
          tar -xzf dist/pirate-synth-sdcard-armv6.tar.gz -C /tmp/pirate-synth-verify

          ARMHF_BIN="/tmp/pirate-synth-verify/pirate-synth-sdcard/boot/firmware/pirate-synth/bin/pirate_synth"
          ARMV6_BIN="/tmp/pirate-synth-verify/pirate-synth-sdcard-armv6/boot/firmware/pirate-synth/bin/pirate_synth"

          ARMHF_SHA="$(sha256sum "$ARMHF_BIN" | awk '{print $1}')"
          ARMV6_SHA="$(sha256sum "$ARMV6_BIN" | awk '{print $1}')"
          if [[ "$ARMHF_SHA" == "$ARMV6_SHA" ]]; then
            echo "armv6 artifact binary matches armhf binary; expected distinct outputs"
            exit 1
          fi

          ARMV6_ATTRS="$(readelf -A "$ARMV6_BIN")"
          # Always print key attributes to make CI failures diagnosable from logs.
          echo "$ARMV6_ATTRS" | grep -E 'Tag_CPU_name|Tag_CPU_arch|Tag_THUMB_ISA_use|Tag_FP_arch'

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_CPU_arch:[[:space:]]*v7'; then
            echo "armv6 artifact reports ARMv7 CPU architecture"
            exit 1
          fi

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_CPU_name:[[:space:]]*"7-A"'; then
            echo "armv6 artifact reports ARMv7-A CPU name"
            exit 1
          fi

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_THUMB_ISA_use:[[:space:]]*Thumb-2'; then
            echo "armv6 artifact reports Thumb-2 ISA usage"
            exit 1
          fi

          if echo "$ARMV6_ATTRS" | grep -Eq 'Tag_FP_arch:[[:space:]]*VFPv3'; then
            echo "armv6 artifact reports VFPv3 floating-point ISA"
            exit 1
          fi

          if ! echo "$ARMV6_ATTRS" | grep -Eq 'Tag_CPU_arch:[[:space:]]*v6'; then
            echo "armv6 artifact does not report ARMv6 CPU architecture attributes"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pirate-synth-sdcard
          path: |
            dist/pirate-synth-sdcard.tar.gz
            dist/pirate-synth-sdcard.zip
            dist/pirate-synth-sdcard-armv6.tar.gz
            dist/pirate-synth-sdcard-armv6.zip
